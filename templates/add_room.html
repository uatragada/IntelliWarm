<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IntelliWarm — Add Room</title>
  <style>
    :root {
      --ink: #0d1b2a; --ink-soft: #1b263b;
      --paper: #f4f6f9; --card: #ffffff;
      --border: #e2e8f0; --accent: #e76f51; --muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", system-ui, sans-serif; color: var(--ink); background: var(--paper); min-height: 100vh; }

    header {
      background: linear-gradient(120deg, var(--ink) 0%, var(--ink-soft) 100%);
      color: #fff; padding: 16px 24px; border-bottom: 3px solid var(--accent);
    }
    .header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
    .brand { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.4px; }
    .brand em { font-style: normal; color: #f4a261; }

    nav { background: var(--card); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 900px; margin: 0 auto; display: flex; padding: 0 24px; }
    nav a {
      text-decoration: none; color: var(--muted); font-weight: 600; font-size: 0.88rem;
      padding: 12px 14px; border-bottom: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s; white-space: nowrap;
    }
    nav a:hover { color: var(--ink); }
    nav a.active { color: var(--accent); border-bottom-color: var(--accent); }

    .container { max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }

    .form-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px 32px;
      box-shadow: 0 2px 14px rgba(13,27,42,0.07);
      max-width: 520px;
    }
    .form-card h2 { font-size: 1.1rem; font-weight: 800; color: var(--ink-soft); margin-bottom: 20px; }

    .field { margin-bottom: 16px; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    input, select {
      width: 100%; padding: 9px 12px;
      border-radius: 8px; border: 1.5px solid var(--border);
      font-size: 0.9rem; color: var(--ink);
      background: var(--paper);
      transition: border-color 0.15s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); background: #fff; }

    .submit-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 8px; padding: 10px 24px;
      background: var(--accent); color: #fff;
      border: none; border-radius: 8px;
      font-weight: 700; font-size: 0.92rem; cursor: pointer;
      transition: background 0.1s, transform 0.08s;
    }
    .submit-btn:hover { background: #d95d39; transform: translateY(-1px); }

    footer { text-align: center; color: var(--muted); font-size: 0.82rem; padding: 20px; border-top: 1px solid var(--border); margin-top: 12px; }

    /* legacy compat */
    .footer { text-align: center; padding: 20px; color: #777; }
  </style>
</head>

<body>
  <header>
    <div class="header-inner">
      <div class="brand">Intelli<em>Warm</em></div>
    </div>
  </header>

  <nav>
    <div class="nav-inner">
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('add_room') }}" class="active">Add Room</a>
      <a href="{{ url_for('config_home') }}">Configure Home</a>
      <a href="{{ url_for('demo') }}">Demo Timeline</a>
    </div>
  </nav>

  <div class="container">
    <div class="form-card">
      <h2>Add a New Room</h2>
      <form method="POST">
        <div class="field">
          <label for="roomName">Room Name</label>
          <input type="text" name="roomName" id="roomName" placeholder="e.g. Master Bedroom" required>
        </div>
        <div class="field">
          <label for="roomSize">Room Size (sq ft)</label>
          <input type="number" name="roomSize" id="roomSize" placeholder="e.g. 200" min="1" required>
        </div>
        <div class="field">
          <label for="targetTemp">Target Temperature (°C)</label>
          <input type="number" name="targetTemp" id="targetTemp" placeholder="e.g. 21" min="10" max="35" step="0.5">
        </div>
        <div class="field">
          <label for="zone">Zone</label>
          <select name="zone" id="zone">
            {% for zone in zones %}
            <option value="{{ zone.name }}">{{ zone.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="field">
          <label for="heatSource">Preferred Heat Source</label>
          <select name="heatSource" id="heatSource">
            <option value="electric">Electric Heater</option>
            <option value="gas_furnace">Gas Furnace</option>
          </select>
        </div>
        <button class="submit-btn" type="submit">+ Add Room</button>
      </form>
    </div>
  </div>

  <footer>IntelliWarm &nbsp;·&nbsp; © 2026 Uday Atragada</footer>
</body>

</html>
